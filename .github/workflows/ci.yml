name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-pack:
    name: Build, test, pack
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore AgentWiki.slnx

      - name: Build
        run: dotnet build AgentWiki.slnx -c Release --no-restore

      - name: Test
        run: dotnet test AgentWiki.slnx -c Release --no-build --verbosity normal

      - name: Pack global tools
        run: |
          # CLI: CI automation surface. Desktop: interactive companion (separate package).
          # Neither is published to NuGet.org from this workflow.
          mkdir -p artifacts
          dotnet pack src/AgentWiki.Cli -c Release --no-build -o artifacts
          # Desktop pack builds Avalonia assets; compile is covered by pack.
          dotnet pack src/AgentWiki.Desktop -c Release -o artifacts
          ls -la artifacts

      - name: Upload nupkg artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agentwiki-nupkg
          path: artifacts/*.nupkg
          if-no-files-found: error
          retention-days: 30

      - name: Smoke-test packed tools
        run: |
          set -euo pipefail
          echo "Installing from local pack (CI artifact only — not published to NuGet.org)"
          TOOLS_DIR="$RUNNER_TEMP/agentwiki-tools"
          mkdir -p "$TOOLS_DIR"
          dotnet tool install AgentWiki.Cli --tool-path "$TOOLS_DIR" --add-source artifacts
          "$TOOLS_DIR/agent-wiki" --version
          "$TOOLS_DIR/agent-wiki" --help | head -20
          # Install Desktop tool package only (do not launch GUI on headless runners).
          dotnet tool install AgentWiki.Desktop --tool-path "$TOOLS_DIR" --add-source artifacts
          test -x "$TOOLS_DIR/agent-wiki-ui" || test -f "$TOOLS_DIR/agent-wiki-ui"
          echo "agent-wiki-ui tool shim present"
          ls -la "$TOOLS_DIR"
