# Dogfood AgentWiki on this repository (offline-capable).
# Consumer repos should copy examples/github-actions/agent-wiki-update.yml instead.
name: Wiki refresh

on:
  schedule:
    # Weekly Monday 03:00 UTC (avoids PR noise from generated timestamps on every push)
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: wiki-refresh
  cancel-in-progress: true

jobs:
  refresh:
    name: Offline wiki generate + PR
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Build CLI
        run: |
          dotnet restore AgentWiki.slnx
          dotnet build src/AgentWiki.Cli -c Release --no-restore

      - name: Generate wiki (offline-friendly)
        env:
          # Optional: set repo secrets/vars for live LLM; otherwise offline inventory wiki.
          AGENTWIKI_Provider: ${{ vars.AGENTWIKI_PROVIDER || 'offline' }}
          AGENTWIKI_DefaultModel: ${{ vars.AGENTWIKI_DEFAULT_MODEL || 'gpt-4o' }}
          AGENTWIKI_AzureOpenAI__Endpoint: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AGENTWIKI_AzureOpenAI__DeploymentName: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
          AGENTWIKI_AzureOpenAI__ApiKey: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AGENTWIKI_OpenAI__ApiKey: ${{ secrets.OPENAI_API_KEY }}
          AGENTWIKI_OpenAI__Endpoint: ${{ secrets.OPENAI_ENDPOINT }}
          AGENTWIKI_OpenAI__Model: ${{ vars.AGENTWIKI_OPENAI_MODEL }}
        run: |
          # Full generate keeps docs/wiki aligned with the product tree without requiring last-run baseline.
          dotnet run --project src/AgentWiki.Cli -c Release --no-build -- \
            generate --repo-path . --output docs/wiki --force --provider offline

      - name: Detect wiki changes
        id: changes
        run: |
          if git status --porcelain -- docs/wiki AGENTS.md CLAUDE.md | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git status --porcelain -- docs/wiki AGENTS.md CLAUDE.md
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No wiki changes."
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs(wiki): refresh agent-optimized wiki"
          title: "docs(wiki): refresh AgentWiki documentation"
          body: |
            ## AgentWiki dogfood refresh

            Offline (or optionally LLM-assisted) regeneration of `docs/wiki/` for this repository.

            Review before merge. For **consumer** repos, copy
            [`examples/github-actions/agent-wiki-update.yml`](../blob/main/examples/github-actions/agent-wiki-update.yml)
            rather than this workflow.
          branch: agent-wiki/wiki-refresh
          delete-branch: true
          add-paths: |
            docs/wiki/**
            AGENTS.md
            CLAUDE.md
